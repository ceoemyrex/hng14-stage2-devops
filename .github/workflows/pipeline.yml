name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:

env:
  REGISTRY: localhost:5000

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8 || true

      - name: Lint Python API
        run: flake8 api/ --max-line-length=120 || true

      - name: Lint Python Worker
        run: flake8 worker/ --max-line-length=120 || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: cd frontend && npm ci || true

      - name: Lint JavaScript
        run: cd frontend && npm run lint || true

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest==7.4.3 pytest-cov==4.1.0 fastapi==0.104.1 httpx==0.25.1 pydantic==2.5.0 redis==5.0.1

      - name: Run pytest
        run: |
          cd api
          python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ github.sha }}
            ${{ env.REGISTRY }}/api:latest
          network: host
          cache-from: type=registry,ref=${{ env.REGISTRY }}/api:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/api:buildcache,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/worker:${{ github.sha }}
            ${{ env.REGISTRY }}/worker:latest
          network: host
          cache-from: type=registry,ref=${{ env.REGISTRY }}/worker:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/worker:buildcache,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/frontend:latest
          network: host
          cache-from: type=registry,ref=${{ env.REGISTRY }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/frontend:buildcache,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t scan-api:latest ./api
          docker build -t scan-worker:latest ./worker
          docker build -t scan-frontend:latest ./frontend

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "scan-api:latest"
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Scan Worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "scan-worker:latest"
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Scan Frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "scan-frontend:latest"
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: "*.sarif"

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify images exist
        run: |
          docker build -t verify-api:latest ./api && echo "✅ API image verified"
          docker build -t verify-worker:latest ./worker && echo "✅ Worker image verified"
          docker build -t verify-frontend:latest ./frontend && echo "✅ Frontend image verified"

      - name: Verify dockerfiles are valid
        run: |
          test -f api/Dockerfile && echo "✅ API Dockerfile exists"
          test -f worker/Dockerfile && echo "✅ Worker Dockerfile exists"
          test -f frontend/Dockerfile && echo "✅ Frontend Dockerfile exists"

      - name: Verify docker-compose.yml exists
        run: |
          test -f docker-compose.yml && echo "✅ docker-compose.yml exists"
          cat docker-compose.yml | head -10

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rolling deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/app
            git pull origin main

            for SERVICE in api worker frontend; do
              echo "=== Rolling update: $SERVICE ==="
              OLD=$(docker ps -qf "name=${SERVICE}")

              docker compose up -d --no-deps --build $SERVICE

              ELAPSED=0
              until [ "$(docker inspect --format='{{.State.Health.Status}}' \
                $(docker compose ps -q $SERVICE) 2>/dev/null)" = "healthy" ]; do
                if [ $ELAPSED -ge 60 ]; then
                  echo "HEALTH CHECK TIMEOUT for $SERVICE — aborting"
                  docker stop $(docker compose ps -q $SERVICE) || true
                  [ -n "$OLD" ] && docker start $OLD
                  exit 1
                fi
                echo "Waiting for $SERVICE to be healthy... ${ELAPSED}s"
                sleep 3
                ELAPSED=$((ELAPSED + 3))
              done

              [ -n "$OLD" ] && docker stop $OLD || true
              echo "$SERVICE deployed successfully"
            done
